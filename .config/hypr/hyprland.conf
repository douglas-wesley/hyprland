
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### DARKMODE ###
################

exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3-dark" # for GTK3
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps
env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt apps
env = _JAVA_AWT_WM_NONREPARENTING,1
################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
#monitor=,preferred,auto,auto

monitor=LVDS-1,1366x768@60,auto,auto

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = nemo
$menu = wofi --show drun --allow-images
$browser = firefox
$textEditor = code


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &

# Politicas

exec-once = blueman-applet
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nwg-dock-hyprland -d -p bottom -l overlay -c "rofi -show drun"
exec-once = waybar
exec-once = swww-daemon 
exec-once = ~/.config/hypr/scripts/wallpaper_slide.sh
exec-once = hypridle
exec-once = dbus-update-activation-enviroment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-enviroment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = swaync
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store
exec-once = swayosd-server # Baixado com yay -S swaosd-git
exec-once = system-config-printer-applet

# Inicia o hypridle (se ainda não estiver)
exec-once = hypridle
# Força o bloqueio de tela imediato ao iniciar a sessão
exec-once = hyprlock
#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEO_DRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 5

    border_size = 0

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgb(253cb0) rgb(25d6b0) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 5
    rounding_power = 3

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.8

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = true

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, slidefade
    # animation = workspacesIn,  1,     1.21,  almostLinear, slidefade
    # animation = workspacesOut, 1,     1.94,  almostLinear, slidefadevert
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }

windowrule {
    name = no-gaps-f1
    match:float = false
    match:workspace = f[1]

    border_size = 0
    rounding = 0
} 

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}



#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = br
    kb_variant = abnt2
    kb_model = abnt2
    kb_options =
    kb_rules =
	
    repeat_rate = 35
    repeat_delay = 600

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, Q, exec, $fileManager
bind = $mainMod, T, togglefloating,

#bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F, fullscreen,
bind = $mainMod, B, exec, $browser 

# Clipboard
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -theme-str 'configuration { show-icons: false; }' | cliphist decode | wl-copy # Configurar isso melhor depois
# Atalhos do Rofi

# Atalho principal (Apps) - Super + D (ou Super + Space se preferir)
bind = $mainMod, D, exec, rofi -show drun - -theme-str 'configuration { show-icons: true; }'

# Favoritos - Super + Shift + D (abre direto na aba Favoritos)
bind = $mainMod SHIFT, D, exec, rofi -show favorites -modi "favorites:~/.config/rofi/scripts/favorites.sh,drun,calc,emoji,window"

# Calculadora - Super + C
# Dica: Use Shift+Enter para copiar o resultado para a área de transferência
bind = $mainMod, C, exec, rofi -show calc -modi calc -no-show-match -no-sort

# Emoji Picker - Super + E
bind = $mainMod, E, exec, rofi -show emoji -emoji-mode copy

# Abrir painel notificação
bind = $mainMod, N, exec, swaync-client -t -sw

# Abrir o Obsidian
bind = $mainMod, O, exec, obsidian

# Wallpapers

# Atalho para trocar wallpaper aleatoriamente agora (SUPER + ALT + W)
bind = $mainMod ALT, W, exec, swww img $(find ~/Imagens/Wallpapers/ -type f | shuf -n 1) --transition-type wave --transition-step 90
# Câmera (F5) — bloqueia/desbloqueia a câmera e mostra OSD
bind = , XF86Webcam, exec, ~/.config/hypr/scripts/camera-toggle.sh

# Comando para alternar o Touchpad no Hyprland + Feedback no SwayOSD
bind = , XF86TouchpadToggle, exec, hyprctl keyword "device[nome-do-seu-touchpad]:enabled" false && swayosd-client --custom-message "Touchpad OFF"
# Prints
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim - | wl-copy
bind = CTRL, Print, exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | wl-copy

# Bar Shutdown p
# bind = $mainMod, CTRL, E, exec, 

# Menu de configurações
bind = $mainMod CTRL, S, exec, ~/.config/hypr/scripts/settings-menu.sh

# Esconder waybar
bind = $mainMod, Space, exec, killall waybar || waybar

# bind = $mainMod, S, exec, spotify & kitty -e cava 

# O parâmetro --class define o nome da janela para "cava_visualizer"
bind = $mainMod ALT, S, exec, spotify & kitty --class cava_visualizer -e cava
# Abrir o Editor de Texto principal
bind = $mainMod, N, exec, $textEditor,

# Lock screen
bind = $mainMod, L, exec, hyprlock

# Move float window without mouse
binde = $mainMod CTRL, H, moveactive, -30 0
binde = $mainMod CTRL, L, moveactive, 30 0
binde = $mainMod CTRL, K, moveactive, 0 -30
binde = $mainMod CTRL, J, moveactive, 0 30

# Move windows with keyboard
bind = $mainMod SHIFT, H,  movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K,    movewindow, u
bind = $mainMod SHIFT, J,  movewindow, d

# Resize windows with keyboard
bind = $mainMod ALT, H,  resizeactive, l
bind = $mainMod ALT, L, resizeactive, r
bind = $mainMod ALT, K,    resizeactive, u
bind = $mainMod ALT, J,  resizeactive, d

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# swayosd-server

# Volume (Aumentar/Diminuir)
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower

# Mute Áudio
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

# Mute Microfone — toggle com OSD "Microfone On/Off"
bind = , XF86AudioMicMute, exec, ~/.config/hypr/scripts/mic-osd.sh

# Brilho (Aumentar/Diminuir)
binde = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
binde = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Caps Lock (Mostra "Caps Lock On" / "Caps Lock Off")
bind = , Caps_Lock, exec, ~/.config/hypr/scripts/caps-lock-osd.sh

# Example special workspace (scratchpad) Nunca usei 
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
# Comentado: Duplicado com swayosd-client (linhas acima) - causa ajuste duplo de volume
# bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
# bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
# bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

# Popup do Google 
windowrule {
    name = firefox-google-oauth
    match:class = ^(firefox)$
    match:title = ^(Sign in.*|.*Google Accounts.*|.*accounts\.google\.com.*)$

    float = true
    center = true
    size = 500 600
}

# Popup Abrir Arquivo/Anexo

windowrule {
    name = firefox-file-dialogs
    match:class = ^(firefox)$
    match:title = ^(Open File|.*Select a file.*|.*Choose a file.*|.*Abrir arquivo.*|.*Selecionar arquivo.*)$

    float = true
    center = true
    size = 600 400
}

# Popups Genéricos

windowrule {
    name = firefox-secondary-windows
    match:class = ^(firefox)$
    match:title = ^(?!.*Mozilla Firefox).*$

    float = true
    center = true
}


windowrule {
    name = cava_visualizer
    match:class = ^(cava_visualizer)$
    size = 400 400
    move = 800 50
    opacity = 0.9
    float = on
}

windowrule {
    name = imv-viewer
    match:class = ^(imv)$
    float = on
    center = on
    size = 900 600
    # Descomente a linha abaixo se quiser que ele fique sobre outras janelas
    # pin = on 
}

windowrule {
    name = portal-file-picker
    match:class = ^(xdg-desktop-portal-gtk)$
    float = on
    center = on
    size = 800 600
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Pavucontrol flutuante !! NÃO FUNCIONANDO
# windowrule = float,class:^(org.pulseaudio.pavucontrol)$, title:^(Controle de volume)$

# Aplicações de configuração flutuantes
windowrule {
    name = config-apps-float
    match:class = ^(pavucontrol|org.pulseaudio.pavucontrol|nm-connection-editor|blueman-manager|gnome-bluetooth|bluetooth-.*|.*settings.*|.*config.*|gsimplecal|nwg-displays|nwg-look|qt5ct|qt6ct)$
    
    float = true
    center = true
    size = 800 600
}

# Controle de volume específico
windowrule {
    name = pavucontrol-float
    match:class = ^(pavucontrol)$
    
    float = true
    center = true
    size = 800 500
}

# Editor de conexões de rede
windowrule {
    name = network-editor-float
    match:class = ^(nm-connection-editor)$
    
    float = true
    center = true
    size = 600 400
}

# Calendário simples
windowrule {
    name = calendar-float
    match:class = ^(gsimplecal)$
    
    float = true
    move = 1150 50
    size = 300 250
}
